# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - careertrack12

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: careertrackacr2026.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_87AC27A2117940819D15D55885E4897B }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_F8043BFA6E2542A697D68EE0935DF69D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: careertrackacr2026.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_87AC27A2117940819D15D55885E4897B }}/careertrack:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_520EC3DD90164DE58146D786E20C1919 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_961A7222400F4BA6A83E39E5661B251E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_926B5354E2E6477BA1CE3BDDC079C9BA }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'careertrack12'
          slot-name: 'Production'
          images: 'careertrackacr2026.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_87AC27A2117940819D15D55885E4897B }}/careertrack:${{ github.sha }}'
          